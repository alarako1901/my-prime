<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Prime - 66 Días</title>

    <!-- PWA: instalable como app en iPhone -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="My Prime">
    <link rel="apple-touch-icon" href="icon-180.png">

    <!-- RENDIMIENTO: preconexión a las fuentes para que el texto no demore -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { width: 100%; height: 100%; }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            padding: 20px 12px;
            overflow-x: hidden;
            /* Sin zoom por doble toque: cada tap responde al instante */
            touch-action: manipulation;
        }

        .container { max-width: 500px; width: 100%; margin: 0 auto; }

        /* ============ HEADER ============ */
        .header { text-align: center; margin-bottom: 20px; }

        .color-square {
            width: 100px; height: 100px;
            background: #6fa89d;
            margin: 0 auto 15px;
            border-radius: 4px;
        }

        .title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

        .subtitle {
            font-family: 'Cascadia Code', monospace;
            font-size: 11px;
            font-weight: 400;
            color: #999;
            margin-top: 8px;
        }

        /* ============ NIVELES ============ */
        .levels {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            margin-bottom: 25px;
        }

        .level {
            font-family: 'Cascadia Code', monospace;
            font-size: 11px;
            font-weight: 400;
            color: #999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .level .dot {
            width: 10px; height: 10px;
            border: 1.5px solid #999;
            border-radius: 50%;
            background: white;
        }

        .level.reached { color: #1a1a1a; font-weight: 600; }
        .level.reached .dot { background: #00d084; border-color: #00d084; }

        .level-line {
            width: 40px;
            height: 0.5px;
            background: #999;
            margin: 0 6px;
            margin-bottom: 16px;
        }

        /* ============ TABLERO ============ */
        .board { display: flex; width: 100%; background: #ffffff; }

        :root {
            --h-header: 95px;
            --h-row: 70px;
        }

        .fixed-col {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            z-index: 2;
        }

        .col-habitos-w { width: 26%; }
        .col-prime-w { width: 25%; }

        .fixed-col .head {
            height: var(--h-header);
            display: flex;
            align-items: flex-end;
            padding-bottom: 12px;
            border-bottom: 0.5px solid #1a1a1a;
        }

        .col-habitos-w .head {
            justify-content: flex-start;
            padding-left: 10px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-right: 0.5px solid #1a1a1a;
        }

        .col-prime-w .head {
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-left: 0.5px solid #1a1a1a;
        }

        .fixed-col .cell {
            height: var(--h-row);
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid #1a1a1a;
        }

        .fixed-col .cell.last { border-bottom: 0.5px solid #1a1a1a; }

        .col-habitos-w .cell {
            justify-content: flex-start;
            padding-left: 10px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.5px;
            border-right: 0.5px solid #1a1a1a;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .col-prime-w .cell {
            justify-content: center;
            gap: 6px;
            border-left: 0.5px solid #1a1a1a;
        }

        /* ============ DÍAS (SCROLL) ============ */
        .days-scroll {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }

        .days-scroll::-webkit-scrollbar { display: none; }
        .days-scroll { scrollbar-width: none; }

        .days-track { display: flex; min-width: 100%; }

        .day-col {
            flex: 0 0 33.3333%;
            display: flex;
            flex-direction: column;
            border-right: 0.5px solid #1a1a1a;
            scroll-snap-align: start;
        }

        .day-col:last-child { border-right: none; }

        .day-col .head {
            height: var(--h-header);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            padding-bottom: 12px;
            border-bottom: 0.5px solid #1a1a1a;
        }

        .day-col .cell {
            height: var(--h-row);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 0.5px solid #1a1a1a;
        }

        .day-col .cell.last { border-bottom: 0.5px solid #1a1a1a; }

        /* Las LÍNEAS nunca pierden opacidad — solo el contenido */
        .day-col.locked .head > * { opacity: 0.4; }
        .day-col.locked .day-checkbox { opacity: 0.4; }

        /* ============ ICONO CALENDARIO ============ */
        .calendar-icon { width: 30px; height: 30px; flex-shrink: 0; }
        .day-col.locked .calendar-icon { width: 23px; height: 23px; }

        .date-text {
            font-family: 'Cascadia Code', monospace;
            font-size: 10px;
            font-weight: 400;
            line-height: 1;
        }

        .day-col.locked .date-text { font-size: 9px; font-weight: 300; }

        .day-text {
            font-family: 'Cascadia Code', monospace;
            font-size: 12px;
            font-weight: 600;
            line-height: 1;
        }

        .day-col.locked .day-text { font-size: 11px; font-weight: 400; }

        /* ============ CHECKBOXES ============ */
        .day-checkbox {
            width: 36px; height: 36px;
            border: 2.5px solid #1a1a1a;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            transition: background 0.15s ease, border-color 0.15s ease;
            color: #1a1a1a;
            flex-shrink: 0;
        }

        .day-col.locked .day-checkbox {
            width: 28px; height: 28px;
            border-color: #999;
            color: #999;
            cursor: default;
            pointer-events: none;
        }

        .day-checkbox.checked {
            background: #1a1a1a;
            border-color: #1a1a1a;
            color: white;
        }

        .day-col.locked .day-checkbox.checked { background: #999; border-color: #999; }

        .day-checkbox::after {
            content: '';
            display: none;
            width: 4px; height: 8px;
            border: solid currentColor;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .day-checkbox.checked::after { display: block; }

        /* ============ PRIME (celda) ============ */
        .percentage {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 12px;
            font-weight: 500;
            min-width: 30px;
            text-align: right;
        }

        .progress-circle-svg { width: 36px; height: 36px; flex-shrink: 0; }

        .progress-circle-bg { fill: none; stroke: #e0e0e0; stroke-width: 2.5; }

        .progress-circle-fill {
            fill: none;
            stroke: #00d084;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-dasharray: 125.66;
            stroke-dashoffset: 125.66;
            transition: stroke-dashoffset 0.3s ease;
            transform-origin: 22px 22px;
            transform: rotate(-90deg);
            opacity: 0;
        }

        .progress-circle-fill.visible { opacity: 1; }

        .progress-circle-checkmark {
            font-size: 16px;
            font-weight: bold;
            text-anchor: middle;
            dominant-baseline: middle;
            fill: #00d084;
            opacity: 0;
        }

        .progress-circle-fill.full ~ .progress-circle-checkmark { opacity: 1; }

        /* ============ FILA AGREGAR ============ */
        .add-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            min-height: 130px;
            padding: 20px;
            border-bottom: 0.5px solid #1a1a1a;
            background: #ffffff;
        }

        .add-button {
            width: 56px; height: 56px;
            border: 2.5px solid #1a1a1a;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .add-button:hover { background: #f9f9f9; }
        .add-button:active { transform: scale(0.95); }

        .add-label {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            text-align: center;
        }

        .add-count {
            font-family: 'Cascadia Code', monospace;
            font-size: 10px;
            color: #999;
        }

        /* ============ PROGRESO (gráfico) ============ */
        .progress-section { margin-top: 30px; }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            padding-left: 10px;
        }

        .chart-wrap { width: 100%; padding: 0 10px; }

        .chart-svg { width: 100%; height: 180px; }

        .chart-axis { stroke: #1a1a1a; stroke-width: 0.5; }

        .chart-axis-label {
            font-family: 'Cascadia Code', monospace;
            font-size: 8px;
            fill: #999;
        }

        .chart-area { fill: rgba(0, 208, 132, 0.12); stroke: none; }

        .chart-line { fill: none; stroke: #00d084; stroke-width: 1.5; }

        .chart-dot { fill: #00d084; }

        /* ============ PRIME TOTAL ============ */
        .prime-general {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 25px 20px;
            border-top: 0.5px solid #1a1a1a;
        }

        .prime-general-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .prime-general-circle-wrap { position: relative; width: 110px; height: 110px; }

        .prime-general-svg { width: 110px; height: 110px; }

        .pg-bg { fill: none; stroke: #e0e0e0; stroke-width: 4; }

        .pg-fill {
            fill: none;
            stroke: #00d084;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 314.16;
            stroke-dashoffset: 314.16;
            transition: stroke-dashoffset 0.3s ease;
            transform-origin: 55px 55px;
            transform: rotate(-90deg);
            opacity: 0;
        }

        .pg-fill.visible { opacity: 1; }

        .prime-general-number {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 500;
        }

        .prime-general-caption {
            font-family: 'Cascadia Code', monospace;
            font-size: 10px;
            color: #999;
            text-align: center;
        }

        /* ============ INTRO ============ */
        .intro {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            /* Evita que los toques rápidos seleccionen/dupliquen el texto */
            user-select: none;
            -webkit-user-select: none;
        }

        .intro.hidden { display: none; }

        .intro-square {
            width: 70px; height: 70px;
            background: #6fa89d;
            border-radius: 4px;
            margin-bottom: 40px;
        }

        .intro-phrase {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.3;
            max-width: 320px;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 0.15s ease-out;
            will-change: opacity;
        }

        .intro-phrase.fading { opacity: 0; }

        .intro-hint {
            font-family: 'Cascadia Code', monospace;
            font-size: 11px;
            color: #999;
            margin-top: 40px;
        }

        .intro-start {
            margin-top: 40px;
            padding: 14px 40px;
            border: 2.5px solid #1a1a1a;
            border-radius: 30px;
            background: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #1a1a1a;
            cursor: pointer;
            display: none;
            transition: transform 0.15s ease;
        }

        .intro-start:active { transform: scale(0.96); }
        .intro-start.visible { display: block; }

        /* Paso final de la intro: digitar tus 4 hábitos */
        .setup {
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 300px;
            margin-top: 10px;
        }

        .setup.visible { display: flex; }

        .setup-sub {
            font-family: 'Cascadia Code', monospace;
            font-size: 11px;
            color: #999;
            margin-bottom: 8px;
        }

        .setup-input {
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px; /* 16px evita el auto-zoom de iOS al enfocar */
            font-weight: 600;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background: #ffffff;
            color: #1a1a1a;
            outline: none;
            width: 100%;
        }

        .setup-input::placeholder { color: #ccc; font-weight: 400; }

        .setup-start {
            margin-top: 12px;
            padding: 14px 40px;
            border: 2.5px solid #1a1a1a;
            border-radius: 30px;
            background: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #1a1a1a;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
            opacity: 0.3;
            pointer-events: none;
        }

        .setup-start.ready { opacity: 1; pointer-events: auto; }
        .setup-start:active { transform: scale(0.96); }

        .setup-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        .setup-row .setup-input { flex: 1; }

        .icon-chip {
            width: 44px; height: 44px;
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            background: #ffffff;
            color: #1a1a1a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 0;
        }

        .icon-chip svg { width: 22px; height: 22px; }

        /* Candado dentro de las celdas bloqueadas (reemplaza al checkbox) */
        .cell-lock { width: 20px; height: 20px; color: #999; opacity: 0.6; flex-shrink: 0; }

        /* Ícono junto al nombre del hábito */
        .habit-row-icon { width: 16px; height: 16px; flex-shrink: 0; }
        .col-habitos-w .cell { gap: 6px; }
        .habit-name-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ============ MODAL (mismo diseño de la app) ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 120;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.hidden { display: none; }

        .modal-card {
            background: #ffffff;
            border: 0.5px solid #1a1a1a;
            border-radius: 8px;
            padding: 22px 20px;
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .modal-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-align: center;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .icon-opt {
            aspect-ratio: 1;
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            background: #ffffff;
            color: #1a1a1a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .icon-opt svg { width: 20px; height: 20px; }

        .icon-opt.selected { background: #1a1a1a; color: #ffffff; }

        .modal-actions { display: flex; gap: 10px; }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: 2.5px solid #1a1a1a;
            border-radius: 24px;
            background: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #1a1a1a;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .modal-btn:active { transform: scale(0.96); }

        .modal-btn.ghost { border-color: #999; color: #999; }

        /* ============ MENSAJE DEL DÍA / CELEBRACIONES ============ */
        .flash {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 95;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .flash.hidden { display: none; }

        .flash-day {
            font-family: 'Cascadia Code', monospace;
            font-size: 12px;
            color: #999;
            margin-bottom: 25px;
        }

        .flash-text {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.35;
            max-width: 320px;
        }

        .flash-hint {
            font-family: 'Cascadia Code', monospace;
            font-size: 11px;
            color: #999;
            margin-top: 40px;
        }

        .flash-btn {
            margin-top: 40px;
            padding: 14px 40px;
            border: 2.5px solid #1a1a1a;
            border-radius: 30px;
            background: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #1a1a1a;
            cursor: pointer;
        }

        /* ============ PRIME POR PILAR (4 círculos pequeños) ============ */
        .pillars-row {
            display: flex;
            justify-content: center;
            gap: 22px;
            margin-top: 6px;
        }

        .pillar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .pillar-wrap { position: relative; width: 44px; height: 44px; }

        .pillar-svg { width: 44px; height: 44px; }

        .pp-bg { fill: none; stroke: #e0e0e0; stroke-width: 2.5; }

        .pp-fill {
            fill: none;
            stroke: #00d084;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-dasharray: 100.53; /* 2π×16 */
            stroke-dashoffset: 100.53;
            transform-origin: 20px 20px;
            transform: rotate(-90deg);
            transition: stroke-dashoffset 0.3s ease;
            opacity: 0;
        }

        .pp-fill.visible { opacity: 1; }

        .pillar-icon-center {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
        }

        .pillar-icon-center svg { width: 16px; height: 16px; }

        .pillar-item.empty .pillar-icon-center { color: #ccc; }

        .pillar-pct {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: #1a1a1a;
        }

        .pillar-item.empty .pillar-pct { color: #ccc; }

        /* ============ SELECTOR DE PILAR (modal) ============ */
        .pillar-select {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .pillar-opt {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 4px;
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            background: #ffffff;
            color: #1a1a1a;
            cursor: pointer;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 9px;
            font-weight: 700;
        }

        .pillar-opt svg { width: 18px; height: 18px; }

        .pillar-opt.selected { background: #1a1a1a; color: #ffffff; }

        /* ============ SUGERENCIAS DE HÁBITOS (chips) ============ */
        .sugg-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }

        .sugg-chip {
            padding: 7px 12px;
            border: 1.5px solid #1a1a1a;
            border-radius: 16px;
            background: #ffffff;
            color: #1a1a1a;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .sugg-chip:active { background: #1a1a1a; color: #fff; }

        .sugg-note {
            font-family: 'Cascadia Code', monospace;
            font-size: 9px;
            color: #999;
            text-align: center;
        }

        /* ============ SETUP: etiqueta de pilar + sugerencias por fila ============ */
        .setup-pill-tag {
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: 'Cascadia Code', monospace;
            font-size: 9px;
            color: #999;
            margin-top: 6px;
        }

        .setup-pill-tag svg { width: 12px; height: 12px; }

        .setup-suggs {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .setup-suggs .sugg-chip {
            font-size: 10px;
            padding: 5px 9px;
            border-width: 1px;
        }

        /* ============ PRIME: 2 arriba, TOTAL al medio, 2 abajo ============ */
        .prime-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            row-gap: 18px;
            column-gap: 6px;
            align-items: center;
            justify-items: center;
            width: 100%;
            max-width: 340px;
        }

        .prime-center {
            grid-column: 2;
            grid-row: 1 / span 2;
        }

        .pillar-label {
            font-family: 'Cascadia Code', monospace;
            font-size: 8px;
            letter-spacing: 0.5px;
            color: #1a1a1a;
            font-weight: 600;
        }

        .pillar-item.empty .pillar-label { color: #ccc; }

        /* ============ NIVELES: candado en retos aún cerrados ============ */
        .level .lock-mini {
            width: 13px;
            height: 13px;
            color: #999;
        }

        /* ============ RACHA ============ */
        .streak {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-top: 6px;
            font-family: 'Cascadia Code', monospace;
            font-size: 11px;
            color: #1a1a1a;
        }

        .streak svg { width: 14px; height: 14px; }
        .streak.zero { color: #ccc; }

        /* ============ SELECTOR PILAR → 10 HÁBITOS → PERSONALIZADO ============ */
        .row-list-btn {
            width: 44px; height: 44px;
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            background: #ffffff;
            color: #1a1a1a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 0;
        }

        .row-list-btn svg { width: 20px; height: 20px; }

        .pillar-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .pillar-big {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 16px 8px;
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            background: #ffffff;
            color: #1a1a1a;
            cursor: pointer;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 11px;
            font-weight: 700;
        }

        .pillar-big svg { width: 26px; height: 26px; }

        .btn-custom {
            padding: 13px;
            border: 2px dashed #999;
            border-radius: 8px;
            background: #ffffff;
            color: #999;
            cursor: pointer;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 13px;
            font-weight: 700;
            width: 100%;
        }

        .picker-list {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            justify-content: center;
        }

        .picker-back {
            background: none;
            border: none;
            color: #999;
            font-family: 'Cascadia Code', monospace;
            font-size: 11px;
            cursor: pointer;
            padding: 4px;
            text-align: left;
        }

        /* ============ MENÚ LATERAL (hamburguesa) ============ */
        .menu-btn {
            position: fixed;
            top: 14px; left: 14px;
            width: 40px; height: 40px;
            background: #ffffff;
            border: none;
            cursor: pointer;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 0;
        }

        .menu-btn span {
            display: block;
            width: 22px;
            height: 2px;
            background: #1a1a1a;
        }

        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 60;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .menu-overlay.open { opacity: 1; pointer-events: auto; }

        .drawer {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 250px;
            background: #ffffff;
            z-index: 70;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 0.5px solid #1a1a1a;
        }

        .drawer.open { transform: translateX(0); }

        .drawer-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding-bottom: 12px;
            border-bottom: 0.5px solid #1a1a1a;
        }

        .drawer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            background: none;
            border: none;
            padding: 8px 0;
            cursor: pointer;
            text-align: left;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            border-bottom: 0.5px solid #1a1a1a;
        }

        .drawer-item .hint {
            font-family: 'Cascadia Code', monospace;
            font-size: 10px;
            color: #999;
            font-weight: 400;
        }

        /* Switch de modo oscuro */
        .switch {
            width: 40px; height: 22px;
            border: 1.5px solid #1a1a1a;
            border-radius: 12px;
            position: relative;
            flex-shrink: 0;
        }

        .switch::after {
            content: '';
            position: absolute;
            top: 2px; left: 2px;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #1a1a1a;
            transition: left 0.2s ease;
        }

        .switch.on::after { left: 20px; background: #00d084; }

        /* ============ MODO OSCURO ============ */
        /* Invierte lo blanco a negro y lo negro a blanco (verde se conserva) */
        html.dark { background: #000; }
        html.dark body { filter: invert(1) hue-rotate(180deg); }

        /* ============ DÍAS BLOQUEADOS (candado) ============ */
        .lock-icon { width: 26px; height: 26px; flex-shrink: 0; }

        .day-col.blocked .day-checkbox {
            border-color: #999;
            color: #999;
            cursor: not-allowed;
        }

        .day-col.blocked .head > * { opacity: 0.4; }
    </style>
</head>
<body>
    <!-- ============ MENSAJE DEL DÍA / CELEBRACIONES / FIN ============ -->

                <button class="row-list-btn" onclick="openChooser('setup', 1)" title="Elegir de la lista"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg></button>

    <script>
        'use strict';

        // ============ CONFIGURACIÓN ============

        const CELL_LOCK_SVG =

        // ============ ÍCONOS DE HÁBITOS (20, estilo Lucide) ============

        const HABIT_ICONS = {

        const ICON_IDS = Object.keys(HABIT_ICONS);

            return '<svg class="' + cls + '" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" ' +

                inner + '</svg>';
        }

        // ============ LOS 4 PILARES ============
        // físico = músculo · mente = cerebro · corazón = corazón · alma = palomita
        const PILLARS = {
            cuerpo: {
                name: 'FÍSICO',
                icon: '<path d="M12.409 13.017A5 5 0 0 1 22 15c0 3.866-4 7-9 7-4.077 0-8.153-.82-10.371-2.462-.426-.316-.631-.832-.62-1.362C2.118 12.723 2.627 2 10 2a3 3 0 0 1 3 3 2 2 0 0 1-2 2c-1.105 0-1.64-.444-2-1"/>'
            },

        // ============ BLOQUES DE DESBLOQUEO ============
        // Solo los primeros 7 días están disponibles al inicio.
        // Cada bloque se desbloquea cumpliendo un % mínimo del anterior:
        //   días 1-7   → siempre disponibles
        //   días 8-15  → requiere 50% del bloque 1-7
        //   días 16-30 → requiere 50% del bloque 8-15
        //   días 31-66 → requiere 70% del bloque 16-30
        const BLOCKS = [
            { start: 1,  end: 7,  req: 0,  prev: null },
            { start: 8,  end: 15, req: 50, prev: [1, 7] },
            { start: 16, end: 30, req: 50, prev: [8, 15] },
            { start: 31, end: 66, req: 70, prev: [16, 30] }
        ];

        function rangeCompliance(s, e) {
            // % de checks cumplidos en el rango de días [s, e]
            const habitsN = state.habits.length;
            const total = habitsN * (e - s + 1);
            let done = 0;
            for (let h = 0; h < habitsN; h++) {
                for (let d = s - 1; d < e; d++) {
                    if (state.checks[h][d]) done++;
                }
            }
            return total > 0 ? Math.round((done / total) * 100) : 0;
        }

        function blockOf(day) {
            return BLOCKS.find(b => day >= b.start && day <= b.end);
        }

        function isBlockUnlocked(b) {
            if (!b.prev) return true;
            return rangeCompliance(b.prev[0], b.prev[1]) >= b.req;
        }

        function isDayBlocked(day) {
            return !isBlockUnlocked(blockOf(day));
        }

        function unlockSignature() {
            return BLOCKS.map(b => (isBlockUnlocked(b) ? '1' : '0')).join('');
        }

        let lastUnlockSig = '';

        // Frases que rotan cada vez que se agrega un hábito (por cantidad)
        const ADD_PHRASES = {

        // ============ ALMACENAMIENTO LOCAL (versionado) ============
        // Esquema v2: { v: 2, startDate, habits: [...], checks: [[...]] }
        // Migra automáticamente datos de la versión anterior.
        let state = null;

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                const s = JSON.parse(raw);
                if (!s || !s.startDate) return null;

                // Migración desde v1 (sin habits): se respetan los que existan;
                // si no hay, el usuario los digitará en la intro
                if (!s.habits || !Array.isArray(s.habits)) {
                    s.habits = [];
                }
                // Íconos por hábito (nuevo): si faltan, asignar rayo por defecto
                if (!s.icons || !Array.isArray(s.icons)) {
                    s.icons = s.habits.map(() => 'zap');
                }
                while (s.icons.length < s.habits.length) s.icons.push('zap');
                s.icons = s.icons.slice(0, s.habits.length);
                // Pilar por hábito (nuevo): por defecto en orden cuerpo/mente/corazón/alma
                if (!s.pillars || !Array.isArray(s.pillars)) {
                    s.pillars = s.habits.map((_, i) => PILLAR_IDS[i % 4]);
                }
                while (s.pillars.length < s.habits.length) s.pillars.push('cuerpo');
                s.pillars = s.pillars.slice(0, s.habits.length);
                if (!s.celebrated || !Array.isArray(s.celebrated)) s.celebrated = [];
                if (typeof s.lastFlash !== 'string') s.lastFlash = '';
                if (!s.checks || !Array.isArray(s.checks)) {
                    s.checks = s.habits.map(() => Array(TOTAL_DAYS).fill(false));
                }
                // Ajustar checks al número de hábitos
                while (s.checks.length < s.habits.length) s.checks.push(Array(TOTAL_DAYS).fill(false));
                s.checks = s.checks.slice(0, s.habits.length);
                s.checks = s.checks.map(arr => {
                    const a = Array.isArray(arr) ? arr.slice(0, TOTAL_DAYS) : [];
                    while (a.length < TOTAL_DAYS) a.push(false);
                    return a;
                });
                s.v = 2;
                return s;
            } catch (e) { return null; }
        }

        function saveState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (e) {}
        }

        state = loadState();
        if (!state) {
            const t = new Date(); t.setHours(0, 0, 0, 0);

                checks: [],

            saveState();
        }

        const START_DATE = new Date(state.startDate);
        const _today = new Date(); _today.setHours(0, 0, 0, 0);
        const _diff = Math.floor((_today - START_DATE) / 86400000);
        const CURRENT_DAY = Math.min(Math.max(_diff + 1, 1), TOTAL_DAYS);

        // ============ TÍTULO DINÁMICO (por fase del reto) ============

        // ============ CONSTRUCCIÓN DEL TABLERO ============
        function formatDate(d) {
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');

        function buildFixedCols() {
            const habits = state.habits;

            // Columna HABITOS (ícono + nombre)
            let hHtml = '<div class="head">HABITOS</div>';

        function buildDays() {
            const habits = state.habits;
            const track = document.getElementById('daysTrack');
            const frag = document.createDocumentFragment();

            for (let day = 1; day <= TOTAL_DAYS; day++) {
                const isCurrent = day === CURRENT_DAY;
                const blocked = isDayBlocked(day);
                const date = new Date(START_DATE);
                date.setDate(date.getDate() + (day - 1));

                const col = document.createElement('div');
                col.className = 'day-col ' + (isCurrent ? 'current' : 'locked') + (blocked ? ' blocked' : '');
                col.dataset.day = day;

                let inner =
                    '<div class="head">' +
                        '<div class="date-text">' + formatDate(date) + '</div>' +
                        (blocked ? LOCK_SVG : CALENDAR_SVG) +
                        '<div class="day-text">Día ' + day + '</div>' +
                    '</div>';

                habits.forEach((_, h) => {
                    const last = h === habits.length - 1 ? ' last' : '';
                    if (blocked) {
                        // Bloqueado absoluto: candado en lugar del checkbox
                        inner += '<div class="cell' + last + '">' + CELL_LOCK_SVG + '</div>';
                    } else {
                        const checked = state.checks[h][day - 1] ? ' checked' : '';
                        inner +=
                            '<div class="cell' + last + '">' +
                                '<div class="day-checkbox' + checked + '" data-habit="' + h + '" data-day="' + (day - 1) + '"></div>' +
                            '</div>';
                    }
                });

                col.innerHTML = inner;
                frag.appendChild(col);
            }

            track.innerHTML = '';
            track.appendChild(frag);
        }

        // RENDIMIENTO: un solo listener para todos los checkboxes (delegación)
        document.getElementById('daysTrack').addEventListener('click', function (e) {
            const col = e.target.closest('.day-col');
            if (!col) return;

            // Tramo bloqueado: informar qué falta (solo si es el día actual)
            if (col.classList.contains('blocked')) {
                if (col.classList.contains('current')) {
                    const b = blockOf(parseInt(col.dataset.day, 10));
                    alert('Bloqueado 🔒 Necesitas al menos ' + b.req + '% de cumplimiento en los días ' +
                        b.prev[0] + ' al ' + b.prev[1] + ' para desbloquear este tramo.');
                }
                return;
            }

            const cb = e.target.closest('.day-checkbox');
            if (!cb || !col.classList.contains('current')) return;

            const h = parseInt(cb.dataset.habit, 10);
            const d = parseInt(cb.dataset.day, 10);

            state.checks[h][d] = !state.checks[h][d];
            cb.classList.toggle('checked');
            saveState();
            updateProgress(h);
            scheduleChart();
            updatePrimeTotal();

            // ¿Se desbloqueó (o re-bloqueó) un tramo? → redibujar días
            const sig = unlockSignature();
            if (sig !== lastUnlockSig) {
                lastUnlockSig = sig;
                buildDays();
                anchorScroll();
            }
        });

        // ============ PROGRESO POR HÁBITO ============
        function habitPercentage(h) {
            let done = 0;
            const arr = state.checks[h];
            for (let i = 0; i < arr.length; i++) if (arr[i]) done++;
            return Math.round((done / TOTAL_DAYS) * 100);
        }

        function updateProgress(h) {
            const percentage = habitPercentage(h);
            const cell = document.querySelector('#primeCol .cell[data-habit="' + h + '"]');
            if (!cell) return;

            cell.querySelector('.percentage').textContent = percentage + '%';

            const fill = cell.querySelector('.progress-circle-fill');
            const circumference = 2 * Math.PI * 19;

            if (percentage === 0) {
                fill.classList.remove('visible', 'full');
                fill.style.strokeDashoffset = circumference;
            } else {
                fill.classList.add('visible');
                fill.style.strokeDashoffset = circumference - (percentage / 100) * circumference;
                fill.classList.toggle('full', percentage === 100);
            }
        }

        // ============ GRÁFICO ============
        // El progreso SIEMPRE arranca desde un punto fijo en 0%
        // (esquina inferior izquierda, permanente). Desde ahí se
        // conectan los días.
        function dailyPercentage(dayIndex) {
            let done = 0;
            for (let h = 0; h < state.habits.length; h++) {
                if (state.checks[h][dayIndex]) done++;
            }
            return Math.round((done / state.habits.length) * 100);
        }

        let chartRaf = null;
        function scheduleChart() {
            // RENDIMIENTO: agrupa redibujos en un solo frame
            if (chartRaf) return;
            chartRaf = requestAnimationFrame(() => { chartRaf = null; drawChart(); });
        }

        function drawChart() {
            const svg = document.getElementById('chartSvg');
            const W = 360, H = 180;
            const padL = 30, padR = 15, padT = 12, padB = 25;
            const plotW = W - padL - padR;
            const plotH = H - padT - padB;
            const baseY = padT + plotH;

            const days = CURRENT_DAY;
            const stepX = plotW / days;

            let content = '';

            // Ejes
            content += '<line class="chart-axis" x1="' + padL + '" y1="' + padT + '" x2="' + padL + '" y2="' + baseY + '"/>';
            content += '<line class="chart-axis" x1="' + padL + '" y1="' + baseY + '" x2="' + (padL + plotW) + '" y2="' + baseY + '"/>';

            [0, 50, 100].forEach(v => {
                const y = baseY - (v / 100) * plotH;
                content += '<text class="chart-axis-label" x="' + (padL - 6) + '" y="' + (y + 2) + '" text-anchor="end">' + v + '</text>';
            });

            // PUNTO FIJO: origen permanente en (0, 0%)
            const pts = [{ x: padL, y: baseY, label: '' }];

            for (let d = 0; d < days; d++) {
                const x = padL + (d + 1) * stepX;
                const y = baseY - (dailyPercentage(d) / 100) * plotH;
                pts.push({ x, y, label: 'D' + (d + 1) });
            }

            // Área (verde transparente) cerrada hasta el eje
            let areaPath = 'M' + pts[0].x + ' ' + baseY;
            pts.forEach(p => { areaPath += ' L' + p.x + ' ' + p.y; });
            areaPath += ' L' + pts[pts.length - 1].x + ' ' + baseY + ' Z';
            content += '<path class="chart-area" d="' + areaPath + '"/>';

            // Línea verde
            const linePath = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p.x + ' ' + p.y).join(' ');
            content += '<path class="chart-line" d="' + linePath + '"/>';

            // Puntos verdes + etiquetas
            pts.forEach(p => {
                content += '<circle class="chart-dot" cx="' + p.x + '" cy="' + p.y + '" r="5"/>';
                if (p.label) {
                    content += '<text class="chart-axis-label" x="' + p.x + '" y="' + (baseY + 14) + '" text-anchor="middle">' + p.label + '</text>';
                }
            });

            svg.innerHTML = content;
        }

        // ============ PRIME TOTAL ============
        function updatePrimeTotal() {
            const n = state.habits.length;
            let sum = 0;
            for (let h = 0; h < n; h++) sum += habitPercentage(h);
            const avg = n > 0 ? Math.round(sum / n) : 0;

            document.getElementById('pgNumber').textContent = avg + '%';

            const fill = document.getElementById('pgFill');
            const circumference = 2 * Math.PI * 50;

            if (avg === 0) {
                fill.classList.remove('visible');
                fill.style.strokeDashoffset = circumference;
            } else {
                fill.classList.add('visible');
                fill.style.strokeDashoffset = circumference - (avg / 100) * circumference;
            }

            updatePillarPrimes();
            updateStreak();
        }

        // ============ RACHA: días perfectos seguidos ============
        const FLAME_SVG =
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" ' +
            'stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
            '<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 ' +
            '.5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>';

        function computeStreak() {
            if (state.habits.length === 0) return 0;
            let streak = 0;
            let d = CURRENT_DAY - 1; // índice de HOY (base 0)
            // Hoy solo cuenta si ya está al 100%; si no, se evalúa desde ayer
            if (dailyPercentage(d) !== 100) d--;
            while (d >= 0 && dailyPercentage(d) === 100) {
                streak++;
                d--;
            }
            return streak;
        }

        function updateStreak() {
            const s = computeStreak();
            const el = document.getElementById('streakLine');
            el.classList.toggle('zero', s === 0);
            el.innerHTML = FLAME_SVG + (s === 1 ? '1 día seguido' : s + ' días seguidos');
        }

        // ============ PRIME POR PILAR (4 círculos pequeños) ============
        function pillarPercentage(pid) {
            const idxs = [];
            state.pillars.forEach((p, i) => { if (p === pid) idxs.push(i); });
            if (idxs.length === 0) return null; // sin hábitos de este pilar
            let sum = 0;
            idxs.forEach(i => { sum += habitPercentage(i); });
            return Math.round(sum / idxs.length);
        }

        function updatePillarPrimes() {
            const circ = 2 * Math.PI * 16;
            // Orden en pantalla: FÍSICO y MENTAL arriba, CORAZÓN y ALMA abajo
            const slotOrder = ['cuerpo', 'mente', 'corazon', 'alma'];
            slotOrder.forEach((pid, s) => {
                const pct = pillarPercentage(pid);
                const empty = pct === null;
                const offset = (empty || pct === 0) ? circ : circ - (pct / 100) * circ;
                document.getElementById('pillarSlot' + s).innerHTML =
                    '<div class="pillar-item' + (empty ? ' empty' : '') + '">' +
                        '<div class="pillar-wrap">' +
                            '<svg class="pillar-svg" viewBox="0 0 40 40">' +
                                '<circle class="pp-bg" cx="20" cy="20" r="16"></circle>' +
                                '<circle class="pp-fill' + (!empty && pct > 0 ? ' visible' : '') + '" cx="20" cy="20" r="16" style="stroke-dashoffset:' + offset + '"></circle>' +
                            '</svg>' +
                            '<div class="pillar-icon-center">' + pillarSvg(pid, '') + '</div>' +
                        '</div>' +
                        '<div class="pillar-pct">' + (empty ? '—' : pct + '%') + '</div>' +
                        '<div class="pillar-label">PRIME ' + PILLARS[pid].name + '</div>' +
                    '</div>';
            });
        }

        // ============ AGREGAR HÁBITO (mín 4, máx 10) ============
        function updateAddLabel() {
            const n = state.habits.length;
            document.getElementById('addLabel').textContent = ADD_PHRASES[n] || ADD_PHRASES[4];
            document.getElementById('addCount').textContent = n + ' de ' + MAX_HABITS + ' hábitos';
        }

        // ============ AGREGAR HÁBITO: modal con pilar + sugerencias ============
        let modalIcon = 'zap';
        let modalPillar = 'cuerpo';

        function missingPillars() {
            return PILLAR_IDS.filter(p => !state.pillars.includes(p));
        }

        function renderModalPillars() {
            document.getElementById('modalPillars').innerHTML = PILLAR_IDS.map(pid =>
                '<button class="pillar-opt' + (pid === modalPillar ? ' selected' : '') + '" data-pillar="' + pid + '">' +
                    pillarSvg(pid, '') + PILLARS[pid].name +
                '</button>'
            ).join('');
        }

        function renderModalSuggs() {
            const missing = missingPillars();
            const note = document.getElementById('suggNote');
            note.textContent = missing.includes(modalPillar)
                ? 'te falta un hábito de ' + PILLARS[modalPillar].name.toLowerCase() + ' — buen momento'
                : 'sugerencias de ' + PILLARS[modalPillar].name.toLowerCase() + ' (o escribe el tuyo)';

            const taken = state.habits.map(h => h.toLowerCase());
            document.getElementById('modalSuggs').innerHTML = SUGGESTIONS[modalPillar]
                .filter(s => !taken.includes(s.n.toLowerCase()))
                .slice(0, 6)
                .map(s => '<button class="sugg-chip" data-name="' + s.n + '" data-icon="' + s.i + '">' + s.n + '</button>')
                .join('');
        }

        function renderModalIcons() {
            document.getElementById('modalIconGrid').innerHTML = ICON_IDS.map(id =>
                '<button class="icon-opt' + (id === modalIcon ? ' selected' : '') + '" data-icon="' + id + '">' +
                    iconSvg(id, '') +
                '</button>'
            ).join('');
        }

        function addHabit() {
            if (state.habits.length >= MAX_HABITS) {
                alert('Máximo ' + MAX_HABITS + ' hábitos. Enfócate en cumplir los que ya tienes.');
                return;
            }
            openChooser('add');
        }

        function openCustomHabit() {
            modalIcon = 'zap';
            // Preseleccionar el pilar que le falta al usuario (balance)
            const missing = missingPillars();
            modalPillar = missing.length ? missing[0] : 'cuerpo';

            renderModalPillars();
            renderModalSuggs();
            renderModalIcons();

            document.getElementById('modalHabitName').value = '';
            document.getElementById('habitModal').classList.remove('hidden');
        }

        document.getElementById('modalPillars').addEventListener('click', function (e) {
            const btn = e.target.closest('.pillar-opt');
            if (!btn) return;
            modalPillar = btn.dataset.pillar;
            renderModalPillars();
            renderModalSuggs();
        });

        document.getElementById('modalSuggs').addEventListener('click', function (e) {
            const chip = e.target.closest('.sugg-chip');
            if (!chip) return;
            document.getElementById('modalHabitName').value = chip.dataset.name;
            modalIcon = chip.dataset.icon;
            renderModalIcons();
        });

        document.getElementById('modalIconGrid').addEventListener('click', function (e) {
            const btn = e.target.closest('.icon-opt');
            if (!btn) return;
            modalIcon = btn.dataset.icon;
            this.querySelectorAll('.icon-opt').forEach(b =>
                b.classList.toggle('selected', b.dataset.icon === modalIcon)
            );
        });

        function closeHabitModal() {
            document.getElementById('habitModal').classList.add('hidden');
        }

        function confirmAddHabit() {
            const name = document.getElementById('modalHabitName').value.trim().slice(0, 18);
            if (!name) return;

            state.habits.push(name);
            state.icons.push(modalIcon);
            state.pillars.push(modalPillar);
            state.checks.push(Array(TOTAL_DAYS).fill(false));
            saveState();

            closeHabitModal();
            buildBoard();
        }

        // ============ NIVELES: candado en los retos aún cerrados ============
        // 7 = siempre abierto · 15/30/66 = candado hasta desbloquear su tramo
        const LEVEL_BLOCK = { 7: 0, 15: 1, 30: 2, 66: 3 };
        const MINI_LOCK =
            '<svg class="lock-mini" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" ' +
            'fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
            '<rect width="18" height="11" x="3" y="11" rx="2"/>' +
            '<path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';

        function updateLevels() {
            document.querySelectorAll('.level').forEach(level => {
                const days = parseInt(level.dataset.days, 10);
                const unlocked = isBlockUnlocked(BLOCKS[LEVEL_BLOCK[days]]);
                const reached = CURRENT_DAY > days;

                level.classList.toggle('reached', reached);
                level.innerHTML = (unlocked
                    ? '<div class="dot"></div>'
                    : MINI_LOCK) + days;
            });
        }

        // ============ ANCLA DEL SCROLL ============
        function anchorScroll() {
            const scroll = document.getElementById('daysScroll');
            const track = document.getElementById('daysTrack');
            if (CURRENT_DAY > 1) {
                const prevCol = track.querySelector('.day-col[data-day="' + (CURRENT_DAY - 1) + '"]');
                if (prevCol) scroll.scrollLeft = prevCol.offsetLeft;
            } else {
                scroll.scrollLeft = 0;
            }
        }

        // ============ CONSTRUIR / REFRESCAR TODO ============
        function buildBoard() {
            buildFixedCols();
            buildDays();
            for (let h = 0; h < state.habits.length; h++) updateProgress(h);
            scheduleChart();
            updatePrimeTotal();
            updateAddLabel();
            anchorScroll();
        }

        // ============ INTRO ============
        const INTRO_PHRASES = [
            'hola',
            'ya estás aquí',
            'sí, yo también me pregunté por qué 66 días',
            'no son 20, no son 30, no son 50. son 66.',
            'los primeros días te va a costar mucho',
            'después...',
            'te va a costar no hacerlo',
            'normalmente la mente se rinde antes que el cuerpo. por eso este reto no es físico.',
            '¿este será tu límite?'
        ];

        let introIndex = 0;
        let introBusy = false;

        function showIntro() {
            document.getElementById('intro').classList.remove('hidden');
            document.getElementById('introPhrase').textContent = INTRO_PHRASES[0];
        }

        // Avance con pointerdown: responde AL INSTANTE del toque (sin el
        // retraso del click) — adiós lag y superposiciones.
        document.getElementById('intro').addEventListener('pointerdown', function (e) {
            // Ignorar toques sobre botones, inputs o el paso de hábitos
            if (e.target.closest('button, input, .setup')) return;
            nextIntroPhrase();
        });

        function nextIntroPhrase() {
            if (document.getElementById('setup').classList.contains('visible')) return;
            if (introBusy) return;
            if (introIndex >= INTRO_PHRASES.length - 1) return;

            introBusy = true;
            const el = document.getElementById('introPhrase');

            // 1) el texto se desvanece por completo…
            el.classList.add('fading');

            setTimeout(() => {
                // 2) …recién ahí entra el texto nuevo…
                introIndex++;
                el.textContent = INTRO_PHRASES[introIndex];

                if (introIndex === INTRO_PHRASES.length - 1) {
                    document.getElementById('introHint').style.display = 'none';
                    document.getElementById('introStart').classList.add('visible');
                }

                // 3) …y aparece con su propio fade
                requestAnimationFrame(() => {
                    el.classList.remove('fading');
                    setTimeout(() => { introBusy = false; }, 160);
                });
            }, 160);
        }

        // ============ PASO: DIGITA TUS 4 HÁBITOS (con ícono) ============
        // Sugeridos por pilar: cuerpo, mente, corazón, alma (cambiables)
        const setupIcons = ['dumbbell', 'book', 'heart', 'zap'];

        function renderChips() {
            for (let i = 0; i < 4; i++) {
                document.getElementById('chip' + i).innerHTML = iconSvg(setupIcons[i], '');
            }
        }

        // Pilar de cada fila del setup (por defecto en orden; el chooser lo cambia)
        const setupPillars = ['cuerpo', 'mente', 'corazon', 'alma'];

        function goToSetup(e) {
            e.stopPropagation();

            // Usuario que ya tiene hábitos (vio el intro de nuevo): entrar directo
            if (state.habits.length >= MIN_HABITS) {
                finishIntro(e);
                return;
            }

            document.getElementById('introStart').classList.remove('visible');
            document.getElementById('introPhrase').textContent = 'empecemos con 4';
            document.getElementById('setup').classList.add('visible');
            renderChips();
        }

        // ============ CHOOSER: 4 PILARES → 10 HÁBITOS → PERSONALIZADO ============
        // mode: 'setup' (llena la fila `row`) | 'add' (agrega hábito directo)
        let chooserMode = 'add';
        let chooserRow = 0;

        function openChooser(mode, row) {
            chooserMode = mode;
            chooserRow = row || 0;
            renderChooserStep1();
            document.getElementById('chooseModal').classList.remove('hidden');
        }

        function closeChooser() {
            document.getElementById('chooseModal').classList.add('hidden');
        }

        function renderChooserStep1() {
            document.getElementById('chooseCard').innerHTML =
                '<div class="modal-title">elige un pilar</div>' +
                '<div class="pillar-grid-2">' +
                    PILLAR_IDS.map(pid =>
                        '<button class="pillar-big" onclick="renderChooserStep2(\'' + pid + '\')">' +
                            pillarSvg(pid, '') + PILLARS[pid].name +
                        '</button>'
                    ).join('') +
                '</div>' +
                '<button class="btn-custom" onclick="chooserCustom()">personalizado</button>';
        }

        function renderChooserStep2(pid) {
            const taken = state.habits.map(h => h.toLowerCase());
            // En setup también descartar lo ya escrito en las otras filas
            if (chooserMode === 'setup') {
                for (let i = 0; i < 4; i++) {
                    const v = document.getElementById('hab' + (i + 1)).value.trim().toLowerCase();
                    if (v) taken.push(v);
                }
            }

            document.getElementById('chooseCard').innerHTML =
                '<button class="picker-back" onclick="renderChooserStep1()">← pilares</button>' +
                '<div class="modal-title">PRIME ' + PILLARS[pid].name + '</div>' +
                '<div class="picker-list">' +
                    SUGGESTIONS[pid]
                        .filter(s => !taken.includes(s.n.toLowerCase()))
                        .map(s =>
                            '<button class="sugg-chip" onclick="chooserPick(\'' + pid + '\',\'' + s.n.replace(/'/g, "\\'") + '\',\'' + s.i + '\')">' +
                                s.n +
                            '</button>'
                        ).join('') +
                '</div>';
        }

        function chooserPick(pid, name, icon) {
            if (chooserMode === 'setup') {
                document.getElementById('hab' + (chooserRow + 1)).value = name;
                setupIcons[chooserRow] = icon;
                setupPillars[chooserRow] = pid;
                renderChips();
                checkSetupReady();
                closeChooser();
            } else {
                if (state.habits.length >= MAX_HABITS) {
                    closeChooser();
                    alert('Máximo ' + MAX_HABITS + ' hábitos. Enfócate en cumplir los que ya tienes.');
                    return;
                }
                state.habits.push(name);
                state.icons.push(icon);
                state.pillars.push(pid);
                state.checks.push(Array(TOTAL_DAYS).fill(false));
                saveState();
                closeChooser();
                buildBoard();
            }
        }

        function chooserCustom() {
            closeChooser();
            if (chooserMode === 'setup') {
                // Escribe el suyo directamente en la fila (pilar = el de la fila)
                document.getElementById('hab' + (chooserRow + 1)).focus();
            } else {
                openCustomHabit();
            }
        }

        // Selector de ícono (para las filas del setup)
        let pickerTarget = null;

        function openIconPicker(i) {
            pickerTarget = i;
            const grid = document.getElementById('pickerGrid');
            grid.innerHTML = ICON_IDS.map(id =>
                '<button class="icon-opt' + (setupIcons[i] === id ? ' selected' : '') + '" data-icon="' + id + '">' +
                    iconSvg(id, '') +
                '</button>'
            ).join('');
            document.getElementById('iconPicker').classList.remove('hidden');
        }

        function closeIconPicker() {
            document.getElementById('iconPicker').classList.add('hidden');
            pickerTarget = null;
        }

        document.getElementById('pickerGrid').addEventListener('click', function (e) {
            const btn = e.target.closest('.icon-opt');
            if (!btn || pickerTarget === null) return;
            setupIcons[pickerTarget] = btn.dataset.icon;
            renderChips();
            closeIconPicker();
        });

        function checkSetupReady() {
            const filled = ['hab1', 'hab2', 'hab3', 'hab4'].every(id =>
                document.getElementById(id).value.trim().length > 0
            );
            document.getElementById('setupStart').classList.toggle('ready', filled);
        }

        ['hab1', 'hab2', 'hab3', 'hab4'].forEach(id => {
            document.getElementById(id).addEventListener('input', checkSetupReady);
        });

        function startChallenge(e) {
            e.stopPropagation();

            const names = ['hab1', 'hab2', 'hab3', 'hab4']
                .map(id => document.getElementById(id).value.trim().slice(0, 18))
                .filter(n => n.length > 0);

            if (names.length < MIN_HABITS) return;

            state.habits = names;
            state.icons = setupIcons.slice(0, names.length);
            // Pilar por fila: el elegido en el selector (o el orden por defecto)
            state.pillars = setupPillars.slice(0, names.length);
            state.checks = names.map(() => Array(TOTAL_DAYS).fill(false));

            // El reto arranca oficialmente HOY, al digitar los hábitos
            const t = new Date(); t.setHours(0, 0, 0, 0);
            state.startDate = t.toISOString();
            saveState();

            try { localStorage.setItem('miPrimeIntroSeen', '1'); } catch (err) {}
            document.getElementById('intro').classList.add('hidden');
            location.reload();
        }

        function finishIntro(e) {
            e.stopPropagation();
            try { localStorage.setItem('miPrimeIntroSeen', '1'); } catch (err) {}
            document.getElementById('intro').classList.add('hidden');
        }

        // ============ MENÚ LATERAL ============
        function toggleMenu(open) {
            document.getElementById('drawer').classList.toggle('open', open);
            document.getElementById('menuOverlay').classList.toggle('open', open);
        }

        // ============ MODO OSCURO ============
        // La app SIEMPRE inicia en modo claro (blanco); el usuario
        // puede activarlo dentro, pero no se recuerda entre sesiones.
        let isDark = false;

        function applyDark() {
            document.documentElement.classList.toggle('dark', isDark);
            document.getElementById('darkSwitch').classList.toggle('on', isDark);
        }

        function setDark(on) {
            isDark = on;
            applyDark();
        }

        // ============ VER INTRO DE NUEVO ============
        function replayIntro() {
            toggleMenu(false);
            introIndex = 0;
            document.getElementById('setup').classList.remove('visible');
            document.getElementById('introHint').style.display = '';
            document.getElementById('introStart').classList.remove('visible');
            showIntro();
        }

        // ============ REINICIAR RETO ============
        function resetChallenge() {
            if (!confirm('Esto borra TODO tu progreso y el reto empieza de cero. ¿Seguro?')) return;
            try {
                localStorage.removeItem(STORAGE_KEY);
                localStorage.removeItem('miPrimeIntroSeen');
            } catch (e) {}
            location.reload();
        }

        // ============ MENSAJE DEL DÍA / CELEBRACIONES / FIN ============
        const rawDay = _diff + 1;

        function todayKey() {
            const t = new Date();
            return t.getFullYear() + '-' + (t.getMonth() + 1) + '-' + t.getDate();
        }

        function showFlash(dayLabel, text, isFinal) {
            document.getElementById('flashDay').textContent = dayLabel;
            document.getElementById('flashText').textContent = text;
            document.getElementById('flashHint').style.display = isFinal ? 'none' : '';
            document.getElementById('flashBtn').style.display = isFinal ? 'block' : 'none';
            document.getElementById('flash').classList.remove('hidden');
        }

        document.getElementById('flash').addEventListener('pointerdown', function (e) {
            if (e.target.closest('button')) return;
            // El fin del reto solo se cierra con el botón
            if (document.getElementById('flashBtn').style.display === 'block') return;
            this.classList.add('hidden');
        });

        function pickDailyMessage() {
            if (CURRENT_DAY === 1) {
                return MESSAGES.welcome[rawDay % MESSAGES.welcome.length];
            }
            const phase = CURRENT_DAY <= 22 ? 'p1' : (CURRENT_DAY <= 44 ? 'p2' : 'p3');
            const yPct = dailyPercentage(CURRENT_DAY - 2); // rendimiento de AYER
            const tier = yPct === 0 ? 'fail' : (yPct < 50 ? 'low' : (yPct < 100 ? 'good' : 'perfect'));
            const pool = MESSAGES[phase][tier];
            return pool[CURRENT_DAY % pool.length]; // determinístico por día
        }

        function maybeShowFlash() {
            // 1) ¿Reto completado? (los 66 días ya pasaron)
            if (rawDay > TOTAL_DAYS) {
                showFlash('66 de 66', 'lo lograste. 66 días. este hábito ya es tuyo. ¿listo para el siguiente?', true);
                return;
            }

            // 2) ¿Celebración de nivel pendiente? (7/15/30 recién superados)
            for (const lvl of [30, 15, 7]) {
                if (CURRENT_DAY > lvl && !state.celebrated.includes(lvl)) {
                    state.celebrated.push(lvl);
                    saveState();
                    showFlash('nivel ' + lvl + ' desbloqueado', MESSAGES.rewards[lvl]);
                    return;
                }
            }

            // 3) Mensaje del día (una sola vez por día)
            const tk = todayKey();
            if (state.lastFlash !== tk) {
                state.lastFlash = tk;
                saveState();
                showFlash('día ' + CURRENT_DAY + ' de ' + TOTAL_DAYS, pickDailyMessage());
            }
        }

        function restartAll(e) {
            e.stopPropagation();
            try {
                localStorage.removeItem(STORAGE_KEY);
                localStorage.removeItem('miPrimeIntroSeen');
            } catch (err) {}
            location.reload(); // vuelve a "hola": intro + nuevos hábitos
        }

        // ============ INICIALIZAR ============
        updateTitle();
        updateLevels();
        lastUnlockSig = unlockSignature();

        let introSeen = false;
        try { introSeen = localStorage.getItem('miPrimeIntroSeen') === '1'; } catch (e) {}
        const needIntro = !introSeen || state.habits.length < MIN_HABITS;

        if (needIntro) {
            // RENDIMIENTO: pintar el intro AL INSTANTE y construir el
            // tablero pesado (66 columnas) en segundo plano, detrás.
            showIntro();
            setTimeout(buildBoard, 400);
        } else {
            buildBoard();
            maybeShowFlash(); // mensaje del día / celebración / fin del reto
        }

        // ============ PWA ============
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
