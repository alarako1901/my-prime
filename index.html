<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Prime - 66 Días</title>

    <!-- PWA: instalable como app en iPhone -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="My Prime">
    <link rel="apple-touch-icon" href="icon-180.png">

    <!-- RENDIMIENTO: preconexión a las fuentes para que el texto no demore -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { width: 100%; height: 100%; }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            padding: 20px 12px;
            overflow-x: hidden;
            /* Sin zoom por doble toque: cada tap responde al instante */
            touch-action: manipulation;
        }

        .container { max-width: 500px; width: 100%; margin: 0 auto; }

        /* ============ HEADER ============ */
        .header { text-align: center; margin-bottom: 20px; }

        .color-square {
            width: 100px; height: 100px;
            background: #6fa89d;
            margin: 0 auto 15px;
            border-radius: 4px;
        }

        .title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

        .subtitle {
            font-family: 'Cascadia Code', monospace;
            font-size: 11px;
            font-weight: 400;
            color: #999;
            margin-top: 8px;
        }

        /* ============ NIVELES ============ */
        .levels {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            margin-bottom: 25px;
        }

        .level {
            font-family: 'Cascadia Code', monospace;
            font-size: 11px;
            font-weight: 400;
            color: #999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .level .dot {
            width: 10px; height: 10px;
            border: 1.5px solid #999;
            border-radius: 50%;
            background: white;
        }

        .level.reached { color: #1a1a1a; font-weight: 600; }
        .level.reached .dot { background: #00d084; border-color: #00d084; }

        .level-line {
            width: 40px;
            height: 0.5px;
            background: #999;
            margin: 0 6px;
            margin-bottom: 16px;
        }

        /* ============ TABLERO ============ */
        .board { display: flex; width: 100%; background: #ffffff; }

        :root {
            --h-header: 95px;
            --h-row: 70px;
        }

        .fixed-col {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            z-index: 2;
        }

        .col-habitos-w { width: 26%; }
        .col-prime-w { width: 25%; }

        .fixed-col .head {
            height: var(--h-header);
            display: flex;
            align-items: flex-end;
            padding-bottom: 12px;
            border-bottom: 0.5px solid #1a1a1a;
        }

        .col-habitos-w .head {
            justify-content: flex-start;
            padding-left: 10px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-right: 0.5px solid #1a1a1a;
        }

        .col-prime-w .head {
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-left: 0.5px solid #1a1a1a;
        }

        .fixed-col .cell {
            height: var(--h-row);
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid #1a1a1a;
        }

        .fixed-col .cell.last { border-bottom: 0.5px solid #1a1a1a; }

        .col-habitos-w .cell {
            justify-content: flex-start;
            padding-left: 10px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.5px;
            border-right: 0.5px solid #1a1a1a;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .col-prime-w .cell {
            justify-content: center;
            gap: 6px;
            border-left: 0.5px solid #1a1a1a;
        }

        /* ============ DÍAS (SCROLL) ============ */
        .days-scroll {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }

        .days-scroll::-webkit-scrollbar { display: none; }
        .days-scroll { scrollbar-width: none; }

        .days-track { display: flex; min-width: 100%; }

        .day-col {
            flex: 0 0 33.3333%;
            display: flex;
            flex-direction: column;
            border-right: 0.5px solid #1a1a1a;
            scroll-snap-align: start;
        }

        .day-col:last-child { border-right: none; }

        .day-col .head {
            height: var(--h-header);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            padding-bottom: 12px;
            border-bottom: 0.5px solid #1a1a1a;
        }

        .day-col .cell {
            height: var(--h-row);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 0.5px solid #1a1a1a;
        }

        .day-col .cell.last { border-bottom: 0.5px solid #1a1a1a; }

        /* Las LÍNEAS nunca pierden opacidad — solo el contenido */
        .day-col.locked .head > * { opacity: 0.4; }
        .day-col.locked .day-checkbox { opacity: 0.4; }

        /* ============ ICONO CALENDARIO ============ */
        .calendar-icon { width: 30px; height: 30px; flex-shrink: 0; }
        .day-col.locked .calendar-icon { width: 23px; height: 23px; }

        .date-text {
            font-family: 'Cascadia Code', monospace;
            font-size: 10px;
            font-weight: 400;
            line-height: 1;
        }

        .day-col.locked .date-text { font-size: 9px; font-weight: 300; }

        .day-text {
            font-family: 'Cascadia Code', monospace;
            font-size: 12px;
            font-weight: 600;
            line-height: 1;
        }

        .day-col.locked .day-text { font-size: 11px; font-weight: 400; }

        /* ============ CHECKBOXES ============ */
        .day-checkbox {
            width: 36px; height: 36px;
            border: 2.5px solid #1a1a1a;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            transition: background 0.15s ease, border-color 0.15s ease;
            color: #1a1a1a;
            flex-shrink: 0;
        }

        .day-col.locked .day-checkbox {
            width: 28px; height: 28px;
            border-color: #999;
            color: #999;
            cursor: default;
            pointer-events: none;
        }

        .day-checkbox.checked {
            background: #1a1a1a;
            border-color: #1a1a1a;
            color: white;
        }

        .day-col.locked .day-checkbox.checked { background: #999; border-color: #999; }

        .day-checkbox::after {
            content: '';
            display: none;
            width: 4px; height: 8px;
            border: solid currentColor;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .day-checkbox.checked::after { display: block; }

        /* ============ PRIME (celda) ============ */
        .percentage {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 12px;
            font-weight: 500;
            min-width: 30px;
            text-align: right;
        }

        .progress-circle-svg { width: 36px; height: 36px; flex-shrink: 0; }

        .progress-circle-bg { fill: none; stroke: #e0e0e0; stroke-width: 2.5; }

        .progress-circle-fill {
            fill: none;
            stroke: #00d084;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-dasharray: 125.66;
            stroke-dashoffset: 125.66;
            transition: stroke-dashoffset 0.3s ease;
            transform-origin: 22px 22px;
            transform: rotate(-90deg);
            opacity: 0;
        }

        .progress-circle-fill.visible { opacity: 1; }

        .progress-circle-checkmark {
            font-size: 16px;
            font-weight: bold;
            text-anchor: middle;
            dominant-baseline: middle;
            fill: #00d084;
            opacity: 0;
        }

        .progress-circle-fill.full ~ .progress-circle-checkmark { opacity: 1; }

        /* ============ FILA AGREGAR ============ */
        .add-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            min-height: 130px;
            padding: 20px;
            border-bottom: 0.5px solid #1a1a1a;
            background: #ffffff;
        }

        .add-button {
            width: 56px; height: 56px;
            border: 2.5px solid #1a1a1a;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .add-button:hover { background: #f9f9f9; }
        .add-button:active { transform: scale(0.95); }

        .add-label {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            text-align: center;
        }

        .add-count {
            font-family: 'Cascadia Code', monospace;
            font-size: 10px;
            color: #999;
        }

        /* ============ PROGRESO (gráfico) ============ */
        .progress-section { margin-top: 30px; }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            padding-left: 10px;
        }

        .chart-wrap { width: 100%; padding: 0 10px; }

        .chart-svg { width: 100%; height: 180px; }

        .chart-axis { stroke: #1a1a1a; stroke-width: 0.5; }

        .chart-axis-label {
            font-family: 'Cascadia Code', monospace;
            font-size: 8px;
            fill: #999;
        }

        .chart-area { fill: rgba(0, 208, 132, 0.12); stroke: none; }

        .chart-line { fill: none; stroke: #00d084; stroke-width: 1.5; }

        .chart-dot { fill: #00d084; }

        /* ============ PRIME TOTAL ============ */
        .prime-general {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 25px 20px;
            border-top: 0.5px solid #1a1a1a;
        }

        .prime-general-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .prime-general-circle-wrap { position: relative; width: 110px; height: 110px; }

        .prime-general-svg { width: 110px; height: 110px; }

        .pg-bg { fill: none; stroke: #e0e0e0; stroke-width: 4; }

        .pg-fill {
            fill: none;
            stroke: #00d084;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 314.16;
            stroke-dashoffset: 314.16;
            transition: stroke-dashoffset 0.3s ease;
            transform-origin: 55px 55px;
            transform: rotate(-90deg);
            opacity: 0;
        }

        .pg-fill.visible { opacity: 1; }

        .prime-general-number {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 500;
        }

        .prime-general-caption {
            font-family: 'Cascadia Code', monospace;
            font-size: 10px;
            color: #999;
            text-align: center;
        }

        /* ============ INTRO ============ */
        .intro {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            /* Evita que los toques rápidos seleccionen/dupliquen el texto */
            user-select: none;
            -webkit-user-select: none;
        }

        .intro.hidden { display: none; }

        .intro-square {
            width: 70px; height: 70px;
            background: #6fa89d;
            border-radius: 4px;
            margin-bottom: 40px;
        }

        .intro-phrase {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.3;
            max-width: 320px;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 0.25s ease;
        }

        .intro-phrase.fading { opacity: 0; }

        .intro-hint {
            font-family: 'Cascadia Code', monospace;
            font-size: 11px;
            color: #999;
            margin-top: 40px;
        }

        .intro-start {
            margin-top: 40px;
            padding: 14px 40px;
            border: 2.5px solid #1a1a1a;
            border-radius: 30px;
            background: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #1a1a1a;
            cursor: pointer;
            display: none;
            transition: transform 0.15s ease;
        }

        .intro-start:active { transform: scale(0.96); }
        .intro-start.visible { display: block; }

        /* Paso final de la intro: digitar tus 4 hábitos */
        .setup {
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 300px;
            margin-top: 10px;
        }

        .setup.visible { display: flex; }

        .setup-sub {
            font-family: 'Cascadia Code', monospace;
            font-size: 11px;
            color: #999;
            margin-bottom: 8px;
        }

        .setup-input {
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px; /* 16px evita el auto-zoom de iOS al enfocar */
            font-weight: 600;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background: #ffffff;
            color: #1a1a1a;
            outline: none;
            width: 100%;
        }

        .setup-input::placeholder { color: #ccc; font-weight: 400; }

        .setup-start {
            margin-top: 12px;
            padding: 14px 40px;
            border: 2.5px solid #1a1a1a;
            border-radius: 30px;
            background: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #1a1a1a;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
            opacity: 0.3;
            pointer-events: none;
        }

        .setup-start.ready { opacity: 1; pointer-events: auto; }
        .setup-start:active { transform: scale(0.96); }

        .setup-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        .setup-row .setup-input { flex: 1; }

        .icon-chip {
            width: 44px; height: 44px;
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            background: #ffffff;
            color: #1a1a1a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 0;
        }

        .icon-chip svg { width: 22px; height: 22px; }

        /* Candado dentro de las celdas bloqueadas (reemplaza al checkbox) */
        .cell-lock { width: 20px; height: 20px; color: #999; opacity: 0.6; flex-shrink: 0; }

        /* Ícono junto al nombre del hábito */
        .habit-row-icon { width: 16px; height: 16px; flex-shrink: 0; }
        .col-habitos-w .cell { gap: 6px; }
        .habit-name-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ============ MODAL (mismo diseño de la app) ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 120;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.hidden { display: none; }

        .modal-card {
            background: #ffffff;
            border: 0.5px solid #1a1a1a;
            border-radius: 8px;
            padding: 22px 20px;
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .modal-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-align: center;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .icon-opt {
            aspect-ratio: 1;
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            background: #ffffff;
            color: #1a1a1a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .icon-opt svg { width: 20px; height: 20px; }

        .icon-opt.selected { background: #1a1a1a; color: #ffffff; }

        .modal-actions { display: flex; gap: 10px; }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: 2.5px solid #1a1a1a;
            border-radius: 24px;
            background: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #1a1a1a;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .modal-btn:active { transform: scale(0.96); }

        .modal-btn.ghost { border-color: #999; color: #999; }

        /* ============ MENÚ LATERAL (hamburguesa) ============ */
        .menu-btn {
            position: fixed;
            top: 14px; left: 14px;
            width: 40px; height: 40px;
            background: #ffffff;
            border: none;
            cursor: pointer;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 0;
        }

        .menu-btn span {
            display: block;
            width: 22px;
            height: 2px;
            background: #1a1a1a;
        }

        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 60;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .menu-overlay.open { opacity: 1; pointer-events: auto; }

        .drawer {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 250px;
            background: #ffffff;
            z-index: 70;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 0.5px solid #1a1a1a;
        }

        .drawer.open { transform: translateX(0); }

        .drawer-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding-bottom: 12px;
            border-bottom: 0.5px solid #1a1a1a;
        }

        .drawer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            background: none;
            border: none;
            padding: 8px 0;
            cursor: pointer;
            text-align: left;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            border-bottom: 0.5px solid #1a1a1a;
        }

        .drawer-item .hint {
            font-family: 'Cascadia Code', monospace;
            font-size: 10px;
            color: #999;
            font-weight: 400;
        }

        /* Switch de modo oscuro */
        .switch {
            width: 40px; height: 22px;
            border: 1.5px solid #1a1a1a;
            border-radius: 12px;
            position: relative;
            flex-shrink: 0;
        }

        .switch::after {
            content: '';
            position: absolute;
            top: 2px; left: 2px;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #1a1a1a;
            transition: left 0.2s ease;
        }

        .switch.on::after { left: 20px; background: #00d084; }

        /* ============ MODO OSCURO ============ */
        /* Invierte lo blanco a negro y lo negro a blanco (verde se conserva) */
        html.dark { background: #000; }
        html.dark body { filter: invert(1) hue-rotate(180deg); }

        /* ============ DÍAS BLOQUEADOS (candado) ============ */
        .lock-icon { width: 26px; height: 26px; flex-shrink: 0; }

        .day-col.blocked .day-checkbox {
            border-color: #999;
            color: #999;
            cursor: not-allowed;
        }

        .day-col.blocked .head > * { opacity: 0.4; }
    </style>
</head>
<body>
    <!-- ============ MENÚ LATERAL ============ -->
    <button class="menu-btn" onclick="toggleMenu(true)" aria-label="Menú">
        <span></span><span></span><span></span>
    </button>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu(false)"></div>

    <div class="drawer" id="drawer">
        <div class="drawer-title">MENÚ</div>

        <button class="drawer-item" onclick="setDark(!isDark)">
            modo oscuro
            <span class="switch" id="darkSwitch"></span>
        </button>

        <button class="drawer-item" onclick="replayIntro()">
            ver intro de nuevo
        </button>

        <button class="drawer-item" onclick="resetChallenge()">
            reiniciar reto
            <span class="hint">borra todo</span>
        </button>
    </div>

    <!-- ============ INTRO ============ -->
    <div class="intro hidden" id="intro" onclick="nextIntroPhrase()">
        <div class="intro-square"></div>
        <div class="intro-phrase" id="introPhrase"></div>
        <div class="intro-hint" id="introHint">toca para continuar</div>
        <button class="intro-start" id="introStart" onclick="goToSetup(event)">empezar</button>

        <!-- Paso final: el usuario digita SUS 4 hábitos con su ícono -->
        <div class="setup" id="setup" onclick="event.stopPropagation()">
            <div class="setup-sub">digita tus 4 hábitos — uno por pilar: cuerpo, mente, corazón, alma</div>
            <div class="setup-row">
                <button class="icon-chip" id="chip0" onclick="openIconPicker(0)"></button>
                <input class="setup-input" id="hab1" maxlength="18" placeholder="cuerpo · ej. entrenar" autocomplete="off">
            </div>
            <div class="setup-row">
                <button class="icon-chip" id="chip1" onclick="openIconPicker(1)"></button>

    <!-- ============ MODAL: NUEVO HÁBITO (mismo diseño de la app) ============ -->

    <div class="container">
        <!-- ============ HEADER ============ -->
        <div class="header">
            <div class="color-square"></div>

        <div class="board">
            <div class="fixed-col col-habitos-w" id="habitsCol"></div>
            <div class="days-scroll" id="daysScroll">
                <div class="days-track" id="daysTrack"></div>

        <div class="add-row">

        <div class="progress-section">

                <svg class="chart-svg" id="chartSvg" viewBox="0 0 360 180" preserveAspectRatio="xMidYMid meet"></svg>

        <!-- ============ PRIME TOTAL ============ -->
        <div class="prime-general">
            <div class="prime-general-title">PRIME TOTAL</div>
            <div class="prime-general-circle-wrap">
                <svg class="prime-general-svg" viewBox="0 0 110 110">
                    <circle class="pg-bg" cx="55" cy="55" r="50"></circle>
                    <circle class="pg-fill" id="pgFill" cx="55" cy="55" r="50"></circle>

    <script>
        'use strict';

        // ============ CONFIGURACIÓN ============
        const TOTAL_DAYS = 66;
        const LEVELS = [7, 15, 30, 66];
        const MIN_HABITS = 4;
        const MAX_HABITS = 10;
        const STORAGE_KEY = 'miPrimeState';

        const CALENDAR_SVG =
            '<svg class="calendar-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" ' +
            'fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
            '<path d="M8 2v4"/><path d="M16 2v4"/>' +
            '<rect width="18" height="18" x="3" y="4" rx="2"/>' +
            '<path d="M3 10h18"/></svg>';

        const LOCK_SVG =
            '<svg class="lock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" ' +
            'fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
            '<rect width="18" height="11" x="3" y="11" rx="2"/>' +
            '<path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';

        const CELL_LOCK_SVG =
            '<svg class="cell-lock" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" ' +
            'fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
            '<rect width="18" height="11" x="3" y="11" rx="2"/>' +
            '<path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';

        // ============ ÍCONOS DE HÁBITOS (20, estilo Lucide) ============
        // Basados en los hábitos más comunes, apoyados en los 4 pilares:
        // CUERPO, MENTE, CORAZÓN y ALMA
        const HABIT_ICONS = {
            // — CUERPO —
            sun: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>', // despertar temprano
            moon: '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>', // dormir temprano
            dumbbell: '<path d="M14.4 14.4 9.6 9.6"/><path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/><path d="m21.5 21.5-1.4-1.4"/><path d="M3.9 3.9 2.5 2.5"/><path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1 2.828-2.829l2.829 2.829a2 2 0 1 1-2.829 2.829z"/>', // entrenar
            activity: '<path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.48 12H2"/>', // cardio / caminar
            droplet: '<path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>', // tomar agua
            snowflake: '<path d="M12 2v20"/><path d="M2 12h20"/><path d="m4.9 4.9 14.2 14.2"/><path d="m19.1 4.9-14.2 14.2"/>', // ducha fría
            apple: '<path d="M12 20.94c1.5 0 2.75 1.06 4 1.06 3 0 6-8 6-12.22A4.91 4.91 0 0 0 17 4.83c-1.45 0-2.63.86-3.5.86s-2.05-.86-3.5-.86A4.9 4.9 0 0 0 5 9.78C5 14 8 22 11 22c1.25 0 2.5-1.06 4-1.06z"/><path d="M10 2c1 .5 2 2 2 5"/>', // comer sano
            // — MENTE —
            book: '<path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/>', // leer
            cap: '<path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/>', // estudiar
            pencil: '<path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/>', // escribir / journal
            phone: '<rect width="14" height="20" x="5" y="2" rx="2"/><path d="M12 18h.01"/>', // no scrolling
            target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>', // enfoque / deep work
            clock: '<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>', // puntualidad / rutina
            music: '<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>', // instrumento
            // — CORAZÓN —
            heart: '<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>', // familia / gratitud
            home: '<path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>', // tiempo en casa
            dollar: '<path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>', // ahorrar
            coffee: '<path d="M10 2v2"/><path d="M14 2v2"/><path d="M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h14a4 4 0 1 1 0 8h-1"/><path d="M6 2v2"/>', // menos café / compartir uno
            // — ALMA —
            wind: '<path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/>', // respirar / meditar
            zap: '<path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>' // orar / propósito
        };

        const ICON_IDS = Object.keys(HABIT_ICONS);

        function iconSvg(id, cls) {
            const inner = HABIT_ICONS[id] || HABIT_ICONS.zap;
            return '<svg class="' + cls + '" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" ' +
                'fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                inner + '</svg>';
        }

        // ============ BLOQUES DE DESBLOQUEO ============
        // Solo los primeros 7 días están disponibles al inicio.
        // Cada bloque se desbloquea cumpliendo un % mínimo del anterior:
        //   días 1-7   → siempre disponibles
        //   días 8-15  → requiere 50% del bloque 1-7
        //   días 16-30 → requiere 50% del bloque 8-15
        //   días 31-66 → requiere 70% del bloque 16-30
        const BLOCKS = [
            { start: 1,  end: 7,  req: 0,  prev: null },
            { start: 8,  end: 15, req: 50, prev: [1, 7] },
            { start: 16, end: 30, req: 50, prev: [8, 15] },
            { start: 31, end: 66, req: 70, prev: [16, 30] }
        ];

        function rangeCompliance(s, e) {
            // % de checks cumplidos en el rango de días [s, e]
            const habitsN = state.habits.length;
            const total = habitsN * (e - s + 1);
            let done = 0;
            for (let h = 0; h < habitsN; h++) {
                for (let d = s - 1; d < e; d++) {
                    if (state.checks[h][d]) done++;
                }
            }
            return total > 0 ? Math.round((done / total) * 100) : 0;
        }

        function blockOf(day) {
            return BLOCKS.find(b => day >= b.start && day <= b.end);
        }

        function isBlockUnlocked(b) {
            if (!b.prev) return true;
            return rangeCompliance(b.prev[0], b.prev[1]) >= b.req;
        }

        function isDayBlocked(day) {
            return !isBlockUnlocked(blockOf(day));
        }

        function unlockSignature() {
            return BLOCKS.map(b => (isBlockUnlocked(b) ? '1' : '0')).join('');
        }

        let lastUnlockSig = '';

        // Frases que rotan cada vez que se agrega un hábito (por cantidad)
        const ADD_PHRASES = {
            4: '¿este será tu límite?',
            5: 'eso. uno más.',
            6: 'así se construye disciplina',
            7: 'tu yo del día 66 te lo va a agradecer',
            8: 'nadie va a venir a hacerlo por ti',
            9: 'esto ya es otro nivel',
            10: '10 hábitos. máximo alcanzado. ahora cúmplelos.'
        };

        // ============ ALMACENAMIENTO LOCAL (versionado) ============
        // Esquema v2: { v: 2, startDate, habits: [...], checks: [[...]] }
        // Migra automáticamente datos de la versión anterior.
        let state = null;

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                const s = JSON.parse(raw);
                if (!s || !s.startDate) return null;

                // Migración desde v1 (sin habits): se respetan los que existan;
                // si no hay, el usuario los digitará en la intro
                if (!s.habits || !Array.isArray(s.habits)) {
                    s.habits = [];
                }
                // Íconos por hábito (nuevo): si faltan, asignar rayo por defecto
                if (!s.icons || !Array.isArray(s.icons)) {
                    s.icons = s.habits.map(() => 'zap');
                }
                while (s.icons.length < s.habits.length) s.icons.push('zap');
                s.icons = s.icons.slice(0, s.habits.length);
                if (!s.checks || !Array.isArray(s.checks)) {
                    s.checks = s.habits.map(() => Array(TOTAL_DAYS).fill(false));
                }
                // Ajustar checks al número de hábitos
                while (s.checks.length < s.habits.length) s.checks.push(Array(TOTAL_DAYS).fill(false));
                s.checks = s.checks.slice(0, s.habits.length);
                s.checks = s.checks.map(arr => {
                    const a = Array.isArray(arr) ? arr.slice(0, TOTAL_DAYS) : [];
                    while (a.length < TOTAL_DAYS) a.push(false);
                    return a;
                });
                s.v = 2;
                return s;
            } catch (e) { return null; }
        }

        function saveState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (e) {}
        }

        state = loadState();
        if (!state) {
            const t = new Date(); t.setHours(0, 0, 0, 0);
            // SIN hábitos por defecto: cada persona digita LOS SUYOS en la intro
            state = {
                v: 2,
                startDate: t.toISOString(),
                habits: [],
                icons: [],
                checks: []
            };
            saveState();
        }

        const START_DATE = new Date(state.startDate);
        const _today = new Date(); _today.setHours(0, 0, 0, 0);
        const _diff = Math.floor((_today - START_DATE) / 86400000);
        const CURRENT_DAY = Math.min(Math.max(_diff + 1, 1), TOTAL_DAYS);

        // ============ TÍTULO DINÁMICO (por fase del reto) ============
        function updateTitle() {
            const remaining = TOTAL_DAYS - CURRENT_DAY;
            let phrase;

            if (CURRENT_DAY <= 7) {
                phrase = '¿no puedes con 7 días?';
            } else if (CURRENT_DAY <= 15) {
                phrase = '¿y con 15, podrás?';
            } else if (CURRENT_DAY <= 30) {
                phrase = '30 días. ¿te vas a rendir ahora?';
            } else if (CURRENT_DAY < TOTAL_DAYS) {
                phrase = 'ya no eres el mismo';
            } else {
                phrase = 'lo lograste';
            }

            document.getElementById('mainTitle').textContent = phrase;
            document.getElementById('mainSubtitle').textContent =
                'Día ' + CURRENT_DAY + ' de ' + TOTAL_DAYS + ' — te faltan ' + remaining + ' días';
        }

        // ============ CONSTRUCCIÓN DEL TABLERO ============
        function formatDate(d) {
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            return dd + '/' + mm;
        }

        function buildFixedCols() {
            const habits = state.habits;

            // Columna HABITOS (ícono + nombre)
            let hHtml = '<div class="head">HABITOS</div>';
            habits.forEach((name, i) => {
                const last = i === habits.length - 1 ? ' last' : '';
                hHtml += '<div class="cell' + last + '">' +
                    iconSvg(state.icons[i], 'habit-row-icon') +
                    '<span class="habit-name-text">' + name + '</span>' +
                '</div>';
            });
            document.getElementById('habitsCol').innerHTML = hHtml;

            // Columna PRIME
            let pHtml = '<div class="head">PRIME</div>';
            habits.forEach((_, i) => {
                const last = i === habits.length - 1 ? ' last' : '';
                pHtml +=
                    '<div class="cell' + last + '" data-habit="' + i + '">' +
                        '<div class="percentage">0%</div>' +
                        '<svg class="progress-circle-svg" viewBox="0 0 44 44">' +
                            '<circle class="progress-circle-bg" cx="22" cy="22" r="19"></circle>' +
                            '<circle class="progress-circle-fill" cx="22" cy="22" r="19"></circle>' +
                            '<text class="progress-circle-checkmark" x="22" y="22">✓</text>' +
                        '</svg>' +
                    '</div>';
            });
            document.getElementById('primeCol').innerHTML = pHtml;
        }

        function buildDays() {
            const habits = state.habits;
            const track = document.getElementById('daysTrack');
            const frag = document.createDocumentFragment();

            for (let day = 1; day <= TOTAL_DAYS; day++) {
                const isCurrent = day === CURRENT_DAY;
                const blocked = isDayBlocked(day);
                const date = new Date(START_DATE);
                date.setDate(date.getDate() + (day - 1));

                const col = document.createElement('div');
                col.className = 'day-col ' + (isCurrent ? 'current' : 'locked') + (blocked ? ' blocked' : '');
                col.dataset.day = day;

                let inner =
                    '<div class="head">' +
                        '<div class="date-text">' + formatDate(date) + '</div>' +
                        (blocked ? LOCK_SVG : CALENDAR_SVG) +
                        '<div class="day-text">Día ' + day + '</div>' +
                    '</div>';

                habits.forEach((_, h) => {
                    const last = h === habits.length - 1 ? ' last' : '';
                    if (blocked) {
                        // Bloqueado absoluto: candado en lugar del checkbox
                        inner += '<div class="cell' + last + '">' + CELL_LOCK_SVG + '</div>';
                    } else {
                        const checked = state.checks[h][day - 1] ? ' checked' : '';
                        inner +=
                            '<div class="cell' + last + '">' +
                                '<div class="day-checkbox' + checked + '" data-habit="' + h + '" data-day="' + (day - 1) + '"></div>' +
                            '</div>';
                    }
                });

                col.innerHTML = inner;
                frag.appendChild(col);
            }

            track.innerHTML = '';
            track.appendChild(frag);
        }

        // RENDIMIENTO: un solo listener para todos los checkboxes (delegación)
        document.getElementById('daysTrack').addEventListener('click', function (e) {
            const col = e.target.closest('.day-col');
            if (!col) return;

            // Tramo bloqueado: informar qué falta (solo si es el día actual)
            if (col.classList.contains('blocked')) {
                if (col.classList.contains('current')) {
                    const b = blockOf(parseInt(col.dataset.day, 10));
                    alert('Bloqueado 🔒 Necesitas al menos ' + b.req + '% de cumplimiento en los días ' +
                        b.prev[0] + ' al ' + b.prev[1] + ' para desbloquear este tramo.');
                }
                return;
            }

            const cb = e.target.closest('.day-checkbox');
            if (!cb || !col.classList.contains('current')) return;

            const h = parseInt(cb.dataset.habit, 10);
            const d = parseInt(cb.dataset.day, 10);

            state.checks[h][d] = !state.checks[h][d];
            cb.classList.toggle('checked');
            saveState();
            updateProgress(h);
            scheduleChart();
            updatePrimeTotal();

            // ¿Se desbloqueó (o re-bloqueó) un tramo? → redibujar días
            const sig = unlockSignature();
            if (sig !== lastUnlockSig) {
                lastUnlockSig = sig;
                buildDays();
                anchorScroll();
            }
        });

        // ============ PROGRESO POR HÁBITO ============
        function habitPercentage(h) {
            let done = 0;
            const arr = state.checks[h];
            for (let i = 0; i < arr.length; i++) if (arr[i]) done++;
            return Math.round((done / TOTAL_DAYS) * 100);
        }

        function updateProgress(h) {
            const percentage = habitPercentage(h);
            const cell = document.querySelector('#primeCol .cell[data-habit="' + h + '"]');
            if (!cell) return;

            cell.querySelector('.percentage').textContent = percentage + '%';

            const fill = cell.querySelector('.progress-circle-fill');
            const circumference = 2 * Math.PI * 19;

            if (percentage === 0) {
                fill.classList.remove('visible', 'full');
                fill.style.strokeDashoffset = circumference;
            } else {
                fill.classList.add('visible');
                fill.style.strokeDashoffset = circumference - (percentage / 100) * circumference;
                fill.classList.toggle('full', percentage === 100);
            }
        }

        // ============ GRÁFICO ============
        // El progreso SIEMPRE arranca desde un punto fijo en 0%
        // (esquina inferior izquierda, permanente). Desde ahí se
        // conectan los días.
        function dailyPercentage(dayIndex) {
            let done = 0;
            for (let h = 0; h < state.habits.length; h++) {
                if (state.checks[h][dayIndex]) done++;
            }
            return Math.round((done / state.habits.length) * 100);
        }

        let chartRaf = null;
        function scheduleChart() {
            // RENDIMIENTO: agrupa redibujos en un solo frame
            if (chartRaf) return;
            chartRaf = requestAnimationFrame(() => { chartRaf = null; drawChart(); });
        }

        function drawChart() {
            const svg = document.getElementById('chartSvg');
            const W = 360, H = 180;
            const padL = 30, padR = 15, padT = 12, padB = 25;
            const plotW = W - padL - padR;
            const plotH = H - padT - padB;
            const baseY = padT + plotH;

            const days = CURRENT_DAY;
            const stepX = plotW / days;

            let content = '';

            // Ejes
            content += '<line class="chart-axis" x1="' + padL + '" y1="' + padT + '" x2="' + padL + '" y2="' + baseY + '"/>';
            content += '<line class="chart-axis" x1="' + padL + '" y1="' + baseY + '" x2="' + (padL + plotW) + '" y2="' + baseY + '"/>';

            [0, 50, 100].forEach(v => {
                const y = baseY - (v / 100) * plotH;
                content += '<text class="chart-axis-label" x="' + (padL - 6) + '" y="' + (y + 2) + '" text-anchor="end">' + v + '</text>';
            });

            // PUNTO FIJO: origen permanente en (0, 0%)
            const pts = [{ x: padL, y: baseY, label: '' }];

            for (let d = 0; d < days; d++) {
                const x = padL + (d + 1) * stepX;
                const y = baseY - (dailyPercentage(d) / 100) * plotH;
                pts.push({ x, y, label: 'D' + (d + 1) });
            }

            // Área (verde transparente) cerrada hasta el eje
            let areaPath = 'M' + pts[0].x + ' ' + baseY;
            pts.forEach(p => { areaPath += ' L' + p.x + ' ' + p.y; });
            areaPath += ' L' + pts[pts.length - 1].x + ' ' + baseY + ' Z';
            content += '<path class="chart-area" d="' + areaPath + '"/>';

            // Línea verde
            const linePath = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p.x + ' ' + p.y).join(' ');
            content += '<path class="chart-line" d="' + linePath + '"/>';

            // Puntos verdes + etiquetas
            pts.forEach(p => {
                content += '<circle class="chart-dot" cx="' + p.x + '" cy="' + p.y + '" r="5"/>';
                if (p.label) {
                    content += '<text class="chart-axis-label" x="' + p.x + '" y="' + (baseY + 14) + '" text-anchor="middle">' + p.label + '</text>';
                }
            });

            svg.innerHTML = content;
        }

        // ============ PRIME TOTAL ============
        function updatePrimeTotal() {
            const n = state.habits.length;
            let sum = 0;
            for (let h = 0; h < n; h++) sum += habitPercentage(h);
            const avg = Math.round(sum / n);

            document.getElementById('pgNumber').textContent = avg + '%';

            const fill = document.getElementById('pgFill');
            const circumference = 2 * Math.PI * 50;

            if (avg === 0) {
                fill.classList.remove('visible');
                fill.style.strokeDashoffset = circumference;
            } else {
                fill.classList.add('visible');
                fill.style.strokeDashoffset = circumference - (avg / 100) * circumference;
            }
        }

        // ============ AGREGAR HÁBITO (mín 4, máx 10) ============
        function updateAddLabel() {
            const n = state.habits.length;
            document.getElementById('addLabel').textContent = ADD_PHRASES[n] || ADD_PHRASES[4];
            document.getElementById('addCount').textContent = n + ' de ' + MAX_HABITS + ' hábitos';
        }

        // ============ AGREGAR HÁBITO: modal con el diseño de la app ============
        let modalIcon = 'zap';

        function addHabit() {
            if (state.habits.length >= MAX_HABITS) {
                alert('Máximo ' + MAX_HABITS + ' hábitos. Enfócate en cumplir los que ya tienes.');
                return;
            }

            modalIcon = 'zap';
            const grid = document.getElementById('modalIconGrid');
            grid.innerHTML = ICON_IDS.map(id =>
                '<button class="icon-opt' + (id === modalIcon ? ' selected' : '') + '" data-icon="' + id + '">' +
                    iconSvg(id, '') +
                '</button>'
            ).join('');

            document.getElementById('modalHabitName').value = '';
            document.getElementById('habitModal').classList.remove('hidden');
            document.getElementById('modalHabitName').focus();
        }

        document.getElementById('modalIconGrid').addEventListener('click', function (e) {
            const btn = e.target.closest('.icon-opt');
            if (!btn) return;
            modalIcon = btn.dataset.icon;
            this.querySelectorAll('.icon-opt').forEach(b =>
                b.classList.toggle('selected', b.dataset.icon === modalIcon)
            );
        });

        function closeHabitModal() {
            document.getElementById('habitModal').classList.add('hidden');
        }

        function confirmAddHabit() {
            const name = document.getElementById('modalHabitName').value.trim().slice(0, 18);
            if (!name) return;

            state.habits.push(name);
            state.icons.push(modalIcon);
            state.checks.push(Array(TOTAL_DAYS).fill(false));
            saveState();

            closeHabitModal();
            buildBoard();
        }

        // ============ NIVELES ============
        function updateLevels() {
            document.querySelectorAll('.level').forEach(level => {
                const days = parseInt(level.dataset.days, 10);
                level.classList.toggle('reached', CURRENT_DAY > days);
            });
        }

        // ============ ANCLA DEL SCROLL ============
        function anchorScroll() {
            const scroll = document.getElementById('daysScroll');
            const track = document.getElementById('daysTrack');
            if (CURRENT_DAY > 1) {
                const prevCol = track.querySelector('.day-col[data-day="' + (CURRENT_DAY - 1) + '"]');
                if (prevCol) scroll.scrollLeft = prevCol.offsetLeft;
            } else {
                scroll.scrollLeft = 0;
            }
        }

        // ============ CONSTRUIR / REFRESCAR TODO ============
        function buildBoard() {
            buildFixedCols();
            buildDays();
            for (let h = 0; h < state.habits.length; h++) updateProgress(h);
            scheduleChart();
            updatePrimeTotal();
            updateAddLabel();
            anchorScroll();
        }

        // ============ INTRO ============
        const INTRO_PHRASES = [
            'hola',
            'ya estás aquí',
            'sí, yo también me pregunté por qué 66 días',
            'no son 20, no son 30, no son 50. son 66.',
            'los primeros días te va a costar mucho',
            'después...',
            'te va a costar no hacerlo',
            'normalmente la mente se rinde antes que el cuerpo. por eso este reto no es físico.',
            '¿este será tu límite?'
        ];

        let introIndex = 0;
        let introBusy = false; // evita que las frases se superpongan al tocar rápido

        function showIntro() {
            document.getElementById('intro').classList.remove('hidden');
            document.getElementById('introPhrase').textContent = INTRO_PHRASES[0];
        }

        function nextIntroPhrase() {
            // Si ya está en el paso de digitar hábitos, no avanzar frases
            if (document.getElementById('setup').classList.contains('visible')) return;
            if (introBusy) return; // transición en curso: ignorar el toque
            if (introIndex >= INTRO_PHRASES.length - 1) return;

            introBusy = true;
            const el = document.getElementById('introPhrase');
            el.classList.add('fading');

            setTimeout(() => {
                introIndex++;
                el.textContent = INTRO_PHRASES[introIndex];
                el.classList.remove('fading');

                if (introIndex === INTRO_PHRASES.length - 1) {
                    document.getElementById('introHint').style.display = 'none';
                    document.getElementById('introStart').classList.add('visible');
                }

                // liberar cuando el fade-in termina
                setTimeout(() => { introBusy = false; }, 260);
            }, 260);
        }

        // ============ PASO: DIGITA TUS 4 HÁBITOS (con ícono) ============
        // Sugeridos por pilar: cuerpo, mente, corazón, alma (cambiables)
        const setupIcons = ['dumbbell', 'book', 'heart', 'zap'];

        function renderChips() {
            for (let i = 0; i < 4; i++) {
                document.getElementById('chip' + i).innerHTML = iconSvg(setupIcons[i], '');
            }
        }

        function goToSetup(e) {
            e.stopPropagation();

            // Usuario que ya tiene hábitos (vio el intro de nuevo): entrar directo
            if (state.habits.length >= MIN_HABITS) {
                finishIntro(e);
                return;
            }

            document.getElementById('introStart').classList.remove('visible');
            document.getElementById('introPhrase').textContent = 'empecemos con 4';
            document.getElementById('setup').classList.add('visible');
            renderChips();
            document.getElementById('hab1').focus();
        }

        // Selector de ícono (para las filas del setup)
        let pickerTarget = null;

        function openIconPicker(i) {
            pickerTarget = i;
            const grid = document.getElementById('pickerGrid');
            grid.innerHTML = ICON_IDS.map(id =>
                '<button class="icon-opt' + (setupIcons[i] === id ? ' selected' : '') + '" data-icon="' + id + '">' +
                    iconSvg(id, '') +
                '</button>'
            ).join('');
            document.getElementById('iconPicker').classList.remove('hidden');
        }

        function closeIconPicker() {
            document.getElementById('iconPicker').classList.add('hidden');
            pickerTarget = null;
        }

        document.getElementById('pickerGrid').addEventListener('click', function (e) {
            const btn = e.target.closest('.icon-opt');
            if (!btn || pickerTarget === null) return;
            setupIcons[pickerTarget] = btn.dataset.icon;
            renderChips();
            closeIconPicker();
        });

        function checkSetupReady() {
            const filled = ['hab1', 'hab2', 'hab3', 'hab4'].every(id =>
                document.getElementById(id).value.trim().length > 0
            );
            document.getElementById('setupStart').classList.toggle('ready', filled);
        }

        ['hab1', 'hab2', 'hab3', 'hab4'].forEach(id => {
            document.getElementById(id).addEventListener('input', checkSetupReady);
        });

        function startChallenge(e) {
            e.stopPropagation();

            const names = ['hab1', 'hab2', 'hab3', 'hab4']
                .map(id => document.getElementById(id).value.trim().slice(0, 18))
                .filter(n => n.length > 0);

            if (names.length < MIN_HABITS) return;

            state.habits = names;
            state.icons = setupIcons.slice(0, names.length);
            state.checks = names.map(() => Array(TOTAL_DAYS).fill(false));

            // El reto arranca oficialmente HOY, al digitar los hábitos
            const t = new Date(); t.setHours(0, 0, 0, 0);
            state.startDate = t.toISOString();
            saveState();

            try { localStorage.setItem('miPrimeIntroSeen', '1'); } catch (err) {}
            document.getElementById('intro').classList.add('hidden');
            location.reload();
        }

        function finishIntro(e) {
            e.stopPropagation();
            try { localStorage.setItem('miPrimeIntroSeen', '1'); } catch (err) {}
            document.getElementById('intro').classList.add('hidden');
        }

        // ============ MENÚ LATERAL ============
        function toggleMenu(open) {
            document.getElementById('drawer').classList.toggle('open', open);
            document.getElementById('menuOverlay').classList.toggle('open', open);
        }

        // ============ MODO OSCURO ============
        let isDark = false;
        try { isDark = localStorage.getItem('miPrimeDark') === '1'; } catch (e) {}

        function applyDark() {
            document.documentElement.classList.toggle('dark', isDark);
            document.getElementById('darkSwitch').classList.toggle('on', isDark);
        }

        function setDark(on) {
            isDark = on;
            try { localStorage.setItem('miPrimeDark', on ? '1' : '0'); } catch (e) {}
            applyDark();
        }

        // ============ VER INTRO DE NUEVO ============
        function replayIntro() {
            toggleMenu(false);
            introIndex = 0;
            document.getElementById('setup').classList.remove('visible');
            document.getElementById('introHint').style.display = '';
            document.getElementById('introStart').classList.remove('visible');
            showIntro();
        }

        // ============ REINICIAR RETO ============
        function resetChallenge() {
            if (!confirm('Esto borra TODO tu progreso y el reto empieza de cero. ¿Seguro?')) return;
            try {
                localStorage.removeItem(STORAGE_KEY);
                localStorage.removeItem('miPrimeIntroSeen');
            } catch (e) {}
            location.reload();
        }

        // ============ INICIALIZAR ============
        updateTitle();
        updateLevels();
        lastUnlockSig = unlockSignature();
        buildBoard();
        applyDark();

        let introSeen = false;
        try { introSeen = localStorage.getItem('miPrimeIntroSeen') === '1'; } catch (e) {}
        // Se muestra si nunca vio el intro O si aún no ha digitado sus 4 hábitos
        if (!introSeen || state.habits.length < MIN_HABITS) showIntro();

        // ============ PWA ============
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
